version: 2

sources:
  - name: f1_raw
    project: f1-pipeline-497820
    dataset: f1_raw
    tables:
      - name: laps
        columns:
          - name: Driver
            tests:
              - not_null
          - name: LapTimeSeconds
            description: "Lap time in seconds - can be null for safety car laps or retirements"
          - name: Compound
            description: "Tyre compound"
            tests:
              - not_null
          - name: Race
            tests:
              - not_null

      - name: pit_stops
        columns:
          - name: Driver
            tests:
              - not_null
          - name: PitDurationSeconds
            description: "Pit stop duration in seconds - can be null for in-laps at race end"

models:
  - name: avg_lap_by_driver
    description: "Average and best lap times per driver per race per compound"
    columns:
      - name: Driver
        description: "Driver abbreviation e.g. VER, HAM"
        tests:
          - not_null
      - name: avg_lap_seconds
        description: "Average lap time in seconds"
        tests:
          - not_null
      - name: Race
        description: "Race name e.g. Bahrain, Monaco"
        tests:
          - not_null

  - name: compound_analysis
    description: "Average lap time per tyre compound across the full season"
    columns:
      - name: Compound
        tests:
          - not_null
          - unique

  - name: race_summary
    description: "Fastest lap and average lap time per race"
    columns:
      - name: Race
        tests:
          - not_null
          